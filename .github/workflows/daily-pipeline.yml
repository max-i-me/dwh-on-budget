name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Create .env file
        run: echo "DUCKDB_PATH=${{ github.workspace }}/data/dwhonbudget.duckdb" > .env

      - name: Create data directory
        run: mkdir -p ${{ github.workspace }}/data
      
      - name: Create dlt secrets
        run: |
          mkdir -p extract/.dlt
          echo '[sources.github]' > extract/.dlt/secrets.toml
          echo 'access_token = "${{ secrets.DLT_GITHUB_TOKEN }}"' >> extract/.dlt/secrets.toml
      
      - name: Download previous database
        uses: actions/download-artifact@v4
        with:
          name: dwhonbudget
          path: data/
        continue-on-error: true

      - name: Install dependencies
        run: make install

      - name: Initialize database
        run: |
          if [ ! -f ${{ github.workspace }}/data/dwhonbudget.duckdb ]; then
            python -c "import duckdb; duckdb.connect('${{ github.workspace }}/data/dwhonbudget.duckdb').close()"
          fi
      
      - name: Run pipeline
        run: make run
      
      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: dwhonbudget
          path: data/*.duckdb
          retention-days: 30
      
      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{"text": "Pipeline failed - <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"}'
        continue-on-error: true
      
      - name: Notify on success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-Type: application/json' \
            -d '{"text": "Pipeline completed successfully"}'
        continue-on-error: true
